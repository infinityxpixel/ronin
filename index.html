<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronin’s Revenge: Mastery</title>
    <!-- Japanese Style Favicon (Ensō / Red Sun) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' stroke='%23cc0000' stroke-width='8' fill='none' stroke-dasharray='200 50'/><circle cx='50' cy='50' r='20' fill='%23cc0000'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui-layer {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            background: #000; transition: opacity 2s ease;
        }
        
        .kanji-title { 
            font-family: 'Noto Serif JP', serif; 
            font-size: 8rem; color: #cc0000; 
            filter: drop-shadow(0 0 20px #cc0000);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .btn-start {
            border: 1px solid #444; color: #888;
            padding: 10px 40px; margin-top: 20px;
            letter-spacing: 0.8em; text-transform: uppercase;
            transition: all 0.5s; cursor: pointer;
        }

        .btn-start:hover {
            border-color: #cc0000; color: #cc0000;
            background: rgba(204, 0, 0, 0.1);
        }

        #focus-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 4px; background: #222; border-radius: 2px;
            overflow: hidden; pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        #focus-progress { width: 100%; height: 100%; background: #fff; transition: width 0.1s linear; }

        .copyright {
            position: fixed; bottom: 10px; right: 15px;
            font-family: sans-serif; font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px; pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="kanji-title">復讐</div>
        <div class="btn-start" onclick="initGame()">Enter The Storm</div>
    </div>

    <div id="focus-bar"><div id="focus-progress"></div></div>

    <div class="copyright">© 2026 Infinity Pixel</div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const RED = '#cc0000';
        const BLACK = '#000000';
        const GOLD = '#ffaa00';

        let width, height;
        let isRunning = false;
        let audioCtx;

        const state = {
            distance: 0,
            timeScale: 1.0,
            slowdownTimer: 0,
            enemies: [],
            particles: [],
            swordTrails: [],
            petals: [],
            explosions: [],
            sakuraTrees: [],
            player: {
                x: 0, y: 0, 
                vx: 0, vy: 0,
                rotation: 0,
                frame: 0,
                move: 'idle',
                moveTimer: 0,
                isGrounded: true
            }
        };

        // Balanced terrain that stays roughly centered vertically
        function getGroundHeight(x) {
            const worldX = x + state.distance;
            const h1 = Math.sin(worldX * 0.002) * 40;
            const h2 = Math.cos(worldX * 0.0008) * 80;
            const h3 = Math.sin(worldX * 0.005) * 15;
            return height * 0.65 + h1 + h2 + h3;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            state.player.x = width / 2; // Keep player in center
            initEnvironment();
        }

        function initEnvironment() {
            state.sakuraTrees = [];
            for (let i = 0; i < 30; i++) {
                state.sakuraTrees.push({
                    worldX: Math.random() * 5000,
                    scale: 0.8 + Math.random() * 1.2
                });
            }
        }

        function createAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(45, audioCtx.currentTime);
            g.gain.value = 0.04;
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
        }

        function spawnEnemy() {
            // Spawn from left or right to meet in center
            const side = Math.random() > 0.5 ? 1 : -1;
            const startX = width/2 + (side * (width/2 + 100));
            state.enemies.push({
                x: startX,
                y: getGroundHeight(startX),
                vx: -side * (4 + Math.random() * 4),
                vy: 0,
                isGrounded: true,
                jumpTimer: 30 + Math.random() * 60,
                frameOffset: Math.random() * 100,
                side: side
            });
        }

        function drawSakuraTree(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#111';
            ctx.fillRect(-4, -90, 8, 90);
            ctx.fillStyle = 'rgba(204, 0, 0, 0.3)';
            [[-15,-100,25],[15,-110,30],[0,-130,35]].forEach(c => {
                ctx.beginPath(); ctx.arc(c[0], c[1], c[2], 0, Math.PI*2); ctx.fill();
            });
            ctx.restore();
        }

        function drawStickman(x, y, color, rot, frame, moveType, isEnemy = false, side = 1) {
            ctx.save();
            ctx.translate(x, y);
            if (isEnemy) ctx.scale(-side, 1); // Face towards center
            
            const slope = (getGroundHeight(x+5) - getGroundHeight(x-5)) / 10;
            ctx.rotate(Math.atan(slope));
            ctx.rotate(rot);

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            const walk = Math.sin(frame * 0.3) * 15;
            const headY = -55;

            ctx.beginPath(); // Legs
            if (moveType === 'spin') {
                ctx.moveTo(0, -25); ctx.lineTo(25, -10);
                ctx.moveTo(0, -25); ctx.lineTo(-25, -10);
            } else {
                ctx.moveTo(0, -25); ctx.lineTo(walk, 0);
                ctx.moveTo(0, -25); ctx.lineTo(-walk, 0);
            }
            ctx.stroke();

            ctx.beginPath(); // Body
            ctx.moveTo(0, -25); ctx.lineTo(0, headY + 5);
            ctx.stroke();

            ctx.beginPath(); // Head
            ctx.arc(0, headY, 7, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath(); // Katana
            ctx.strokeStyle = isEnemy ? '#333' : RED;
            if (moveType === 'spin') {
                const sRot = frame * 0.8;
                ctx.moveTo(Math.cos(sRot)*10, -40 + Math.sin(sRot)*10);
                ctx.lineTo(Math.cos(sRot)*75, -40 + Math.sin(sRot)*75);
            } else if (moveType === 'blink') {
                ctx.moveTo(0, -40); ctx.lineTo(80, -40);
            } else {
                ctx.moveTo(0, -40); ctx.lineTo(25, -10);
            }
            ctx.stroke();

            ctx.restore();
        }

        function triggerExplosion(x, y) {
            state.explosions.push({ x, y, r: 0, opacity: 1 });
            for(let i=0; i<20; i++) {
                state.particles.push({
                    x, y,
                    vx: (Math.random()-0.5)*20,
                    vy: (Math.random()-0.5)*20,
                    life: 1.5,
                    color: Math.random() > 0.5 ? GOLD : RED,
                    size: 2 + Math.random() * 4
                });
            }
        }

        function update() {
            // Handle Slowdown
            if (state.slowdownTimer > 0) {
                state.slowdownTimer -= 16.66; // approx ms
                state.timeScale = 0.5;
                document.getElementById('focus-bar').style.opacity = '1';
                document.getElementById('focus-progress').style.width = (state.slowdownTimer / 3000 * 100) + '%';
            } else {
                state.timeScale = 1.0;
                document.getElementById('focus-bar').style.opacity = '0';
            }

            const ts = state.timeScale;
            const p = state.player;
            p.frame += ts;
            state.distance += 8 * ts;

            // Blossom Petals
            if (Math.random() < 0.1 * ts) {
                state.petals.push({
                    x: Math.random() > 0.5 ? -50 : width + 50,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 10,
                    vy: 1 + Math.random() * 2,
                    r: Math.random() * Math.PI,
                    rv: 0.1
                });
            }

            // Player logic
            const targetGround = getGroundHeight(p.x);
            if (p.moveTimer > 0) {
                p.moveTimer -= ts;
            } else {
                const r = Math.random();
                if (r < 0.03) { 
                    p.move = 'jump'; p.vy = -26; p.isGrounded = false; p.moveTimer = 40;
                } else if (r < 0.04) { 
                    p.move = 'spin'; p.moveTimer = 40; p.vy = -14; p.isGrounded = false;
                } else if (r < 0.02) { 
                    p.move = 'blink'; p.moveTimer = 10;
                    // Flash dash - instant effect
                    state.enemies.forEach((en, i) => {
                       if (Math.abs(en.x - p.x) < 300) {
                           triggerExplosion(en.x, en.y-40);
                           state.enemies.splice(i, 1);
                       }
                    });
                } else { p.move = 'run'; }
            }

            if (!p.isGrounded) {
                p.vy += 1.2 * ts;
                p.y += p.vy * ts;
                p.rotation += (p.move === 'spin' ? 0.7 : 0.05) * ts;
                if (p.y >= targetGround) {
                    p.y = targetGround; p.isGrounded = true; p.vy = 0; p.rotation = 0;
                }
            } else {
                p.y = targetGround;
            }

            // Enemies
            if (state.enemies.length < 12 && Math.random() < 0.05 * ts) spawnEnemy();

            state.enemies.forEach((en, i) => {
                en.x += en.vx * ts;
                const enGround = getGroundHeight(en.x);
                en.jumpTimer -= ts;
                if (en.isGrounded && en.jumpTimer < 0) {
                    en.vy = -18 - Math.random() * 10; en.isGrounded = false; en.jumpTimer = 60 + Math.random() * 100;
                }
                if (!en.isGrounded) {
                    en.vy += 1.2 * ts; en.y += en.vy * ts;
                    if (en.y >= enGround) { en.y = enGround; en.isGrounded = true; en.vy = 0; }
                } else { en.y = enGround; }

                const dist = Math.sqrt((en.x-p.x)**2 + (en.y-p.y)**2);
                if (dist < 140 && (p.move === 'spin' || Math.random() < 0.2)) {
                    triggerExplosion(en.x, en.y - 40);
                    state.enemies.splice(i, 1);
                    state.swordTrails.push({x: p.x, y: p.y, tx: en.x, ty: en.y, life: 1.0});
                }
                if (Math.abs(en.x - p.x) > width) state.enemies.splice(i, 1);
            });

            // Cleanup / FX Update
            state.explosions.forEach((ex, i) => { ex.r += 8 * ts; ex.opacity -= 0.05 * ts; if(ex.opacity <= 0) state.explosions.splice(i, 1); });
            state.particles.forEach((pt, i) => { pt.x += pt.vx * ts; pt.y += pt.vy * ts; pt.vy += 0.5 * ts; pt.life -= 0.04 * ts; if(pt.life <= 0) state.particles.splice(i, 1); });
            state.petals.forEach((pe, i) => { pe.x += pe.vx * ts; pe.y += pe.vy * ts; pe.r += pe.rv * ts; if(pe.y > height + 50) state.petals.splice(i, 1); });
            state.swordTrails.forEach((tr, i) => { tr.life -= 0.12 * ts; if(tr.life <= 0) state.swordTrails.splice(i, 1); });
        }

        function draw() {
            update();
            
            // Background color shifts during slow-mo
            const bgColor = state.timeScale < 1 ? '#080808' : BLACK;
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);

            // Background Sakura Trees
            state.sakuraTrees.forEach(t => {
                let tx = (t.worldX - (state.distance * 0.4)) % (width * 2);
                if (tx < -300) tx += width * 2;
                drawSakuraTree(tx, getGroundHeight(tx), t.scale);
            });

            // Terrain Fill
            ctx.beginPath();
            ctx.moveTo(0, height);
            for(let x=0; x<=width; x+=10) {
                ctx.lineTo(x, getGroundHeight(x));
            }
            ctx.lineTo(width, height);
            ctx.fillStyle = state.timeScale < 1 ? '#050505' : '#040000';
            ctx.fill();

            // Terrain Edge
            ctx.strokeStyle = state.timeScale < 1 ? '#444' : RED;
            ctx.lineWidth = 3;
            ctx.beginPath();
            for(let x=0; x<=width; x+=5) {
                const y = getGroundHeight(x);
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // FX: Sword Trails
            state.swordTrails.forEach(tr => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${tr.life})`;
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(tr.x, tr.y - 40); ctx.lineTo(tr.tx, tr.ty - 40); ctx.stroke();
            });

            // FX: Explosions
            state.explosions.forEach(ex => {
                ctx.strokeStyle = `rgba(255, 170, 0, ${ex.opacity})`;
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2); ctx.stroke();
            });

            // Entities
            state.enemies.forEach(en => {
                drawStickman(en.x, en.y, '#222', en.isGrounded ? 0 : Math.sin(state.player.frame*0.2), state.player.frame + en.frameOffset, 'run', true, en.side);
            });
            const p = state.player;
            drawStickman(p.x, p.y, state.timeScale < 1 ? '#fff' : RED, p.rotation, p.frame, p.move);

            // Petals & Particles
            ctx.fillStyle = RED;
            state.petals.forEach(pe => {
                ctx.save(); ctx.translate(pe.x, pe.y); ctx.rotate(pe.r); ctx.fillRect(-2, -1, 5, 3); ctx.restore();
            });
            state.particles.forEach(pt => {
                ctx.fillStyle = pt.color;
                ctx.globalAlpha = pt.life;
                ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
            });
            ctx.globalAlpha = 1;

            if (isRunning) requestAnimationFrame(draw);
        }

        function handleSlowmo() {
            if (!isRunning) return;
            state.slowdownTimer = 3000; // 3 seconds
        }

        window.addEventListener('mousedown', handleSlowmo);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleSlowmo();
        });

        function initGame() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 2000);
            isRunning = true;
            createAudio();
            resize();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
