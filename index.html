<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronin’s Revenge: Mastery</title>
    <!-- Japanese Style Favicon (Ensō / Red Sun) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' stroke='%23cc0000' stroke-width='8' fill='none' stroke-dasharray='200 50'/><circle cx='50' cy='50' r='20' fill='%23cc0000'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; cursor: crosshair; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui-layer {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            background: #000; transition: opacity 2s ease;
        }
        
        .kanji-title { 
            font-family: 'Noto Serif JP', serif; 
            font-size: 8rem; color: #cc0000; 
            filter: drop-shadow(0 0 20px #cc0000);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .btn-start {
            border: 1px solid #444; color: #888;
            padding: 10px 40px; margin-top: 20px;
            letter-spacing: 0.8em; text-transform: uppercase;
            transition: all 0.5s; cursor: pointer;
        }

        .btn-start:hover {
            border-color: #cc0000; color: #cc0000;
            background: rgba(204, 0, 0, 0.1);
        }

        #focus-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 4px; background: #222; border-radius: 2px;
            overflow: hidden; pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        #focus-progress { width: 100%; height: 100%; background: #fff; transition: width 0.1s linear; }

        .copyright {
            position: fixed; bottom: 10px; right: 15px;
            font-family: sans-serif; font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px; pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="kanji-title">復讐</div>
        <div class="btn-start" onclick="initGame()">Enter The Storm</div>
    </div>

    <div id="focus-bar"><div id="focus-progress"></div></div>
    <div class="copyright">© 2026 Infinity Pixel</div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const RED = '#cc0000';
        const BLACK = '#000000';
        const GOLD = '#ffaa00';
        const DARK_RED = '#440000';

        let width, height;
        let isRunning = false;

        const state = {
            distance: 0,
            timeScale: 1.0,
            slowdownTimer: 0,
            hitStop: 0,
            enemies: [],
            particles: [],
            swordTrails: [],
            petals: [],
            sakuraTrees: [],
            player: {
                x: 0, y: 0, 
                vx: 0, vy: 0,
                rotation: 0,
                frame: 0,
                move: 'idle',
                moveTimer: 0,
                isGrounded: true
            }
        };

        function getGroundHeight(x) {
            const worldX = x + state.distance;
            const h1 = Math.sin(worldX * 0.002) * 40;
            const h2 = Math.cos(worldX * 0.0008) * 80;
            const h3 = Math.sin(worldX * 0.005) * 15;
            return height * 0.65 + h1 + h2 + h3;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            state.player.x = width / 2;
            initEnvironment();
        }

        function initEnvironment() {
            state.sakuraTrees = [];
            for (let i = 0; i < 30; i++) {
                state.sakuraTrees.push({
                    worldX: Math.random() * 5000,
                    scale: 0.8 + Math.random() * 1.2
                });
            }
        }

        function spawnEnemy() {
            const side = Math.random() > 0.5 ? 1 : -1;
            const startX = width/2 + (side * (width/2 + 100));
            state.enemies.push({
                x: startX,
                y: getGroundHeight(startX),
                vx: -side * (4 + Math.random() * 4),
                vy: 0,
                isGrounded: true,
                jumpTimer: 30 + Math.random() * 60,
                frameOffset: Math.random() * 100,
                side: side
            });
        }

        function drawSakuraTree(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#111';
            ctx.fillRect(-4, -90, 8, 90);
            ctx.fillStyle = RED;
            ctx.globalAlpha = 0.25;
            [[-15,-100,25],[15,-110,30],[0,-130,35]].forEach(c => {
                ctx.beginPath(); ctx.arc(c[0], c[1], c[2], 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawStickman(x, y, color, rot, frame, moveType, isEnemy = false, side = 1) {
            ctx.save();
            ctx.translate(x, y);
            if (isEnemy) ctx.scale(-side, 1);
            
            const slope = (getGroundHeight(x+5) - getGroundHeight(x-5)) / 10;
            ctx.rotate(Math.atan(slope));
            
            if (moveType === 'parry') {
                ctx.rotate(-0.2); // Brace backwards
            } else {
                ctx.rotate(rot);
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            const walk = Math.sin(frame * 0.3) * 15;
            const headY = -55;

            ctx.beginPath();
            if (moveType === 'spin') {
                ctx.moveTo(0, -25); ctx.lineTo(25, -10);
                ctx.moveTo(0, -25); ctx.lineTo(-25, -10);
            } else if (moveType === 'parry') {
                ctx.moveTo(0, -25); ctx.lineTo(10, 0);
                ctx.moveTo(0, -25); ctx.lineTo(-10, 0);
            } else {
                ctx.moveTo(0, -25); ctx.lineTo(walk, 0);
                ctx.moveTo(0, -25); ctx.lineTo(-walk, 0);
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, -25); ctx.lineTo(0, headY + 5);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, headY, 7, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = isEnemy ? '#333' : RED;
            if (moveType === 'spin') {
                const sRot = frame * 0.8;
                ctx.moveTo(Math.cos(sRot)*10, -40 + Math.sin(sRot)*10);
                ctx.lineTo(Math.cos(sRot)*75, -40 + Math.sin(sRot)*75);
            } else if (moveType === 'blink') {
                ctx.moveTo(0, -40); ctx.lineTo(80, -40);
            } else if (moveType === 'parry') {
                // Vertical block pose
                ctx.moveTo(15, -70); ctx.lineTo(15, -10);
            } else {
                ctx.moveTo(0, -40); ctx.lineTo(25, -10);
            }
            ctx.stroke();

            ctx.restore();
        }

        function triggerCombatImpact(x, y, intensity = 1) {
            state.hitStop = 4;
            
            const particleCount = 70 * intensity;
            for(let i=0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 25 * intensity;
                state.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 5,
                    life: 0.8 + Math.random() * 0.6,
                    color: Math.random() > 0.3 ? RED : GOLD,
                    size: 1 + Math.random() * 3
                });
            }
        }

        function update() {
            if (state.hitStop > 0) {
                state.hitStop--;
                return;
            }

            if (state.slowdownTimer > 0) {
                state.slowdownTimer -= 16.66;
                state.timeScale = 0.2; // Slowed down by additional 20% (0.4 -> 0.2)
                document.getElementById('focus-bar').style.opacity = '1';
                document.getElementById('focus-progress').style.width = (state.slowdownTimer / 3000 * 100) + '%';
            } else {
                state.timeScale = 1.0;
                document.getElementById('focus-bar').style.opacity = '0';
            }

            const ts = state.timeScale;
            const p = state.player;
            p.frame += ts;
            state.distance += 8 * ts;

            if (Math.random() < 0.12 * ts) {
                state.petals.push({
                    x: Math.random() * width,
                    y: -50,
                    vx: (Math.random() - 0.5) * 5,
                    vy: 1 + Math.random() * 2,
                    r: Math.random() * Math.PI,
                    rv: 0.1
                });
            }

            const targetGround = getGroundHeight(p.x);
            if (p.moveTimer > 0) {
                p.moveTimer -= ts;
            } else {
                const r = Math.random();
                if (r < 0.025) { 
                    p.move = 'jump'; p.vy = -26; p.isGrounded = false; p.moveTimer = 40;
                } else if (r < 0.05) { 
                    p.move = 'spin'; p.moveTimer = 40; p.vy = -14; p.isGrounded = false;
                } else if (r < 0.065) { 
                    p.move = 'parry'; p.moveTimer = 25; // Parry pose
                } else if (r < 0.02) { 
                    p.move = 'blink'; p.moveTimer = 10;
                    state.enemies.forEach((en, i) => {
                       if (Math.abs(en.x - p.x) < 300) {
                           triggerCombatImpact(en.x, en.y-40, 1.8);
                           state.enemies.splice(i, 1);
                       }
                    });
                } else { p.move = 'run'; }
            }

            if (!p.isGrounded) {
                p.vy += 1.2 * ts;
                p.y += p.vy * ts;
                p.rotation += (p.move === 'spin' ? 0.7 : 0.05) * ts;
                if (p.y >= targetGround) {
                    p.y = targetGround; p.isGrounded = true; p.vy = 0; p.rotation = 0;
                }
            } else {
                p.y = targetGround;
            }

            if (state.enemies.length < 10 && Math.random() < 0.05 * ts) spawnEnemy();

            state.enemies.forEach((en, i) => {
                en.x += en.vx * ts;
                const enGround = getGroundHeight(en.x);
                en.jumpTimer -= ts;
                if (en.isGrounded && en.jumpTimer < 0) {
                    en.vy = -18 - Math.random() * 10; en.isGrounded = false; en.jumpTimer = 60 + Math.random() * 100;
                }
                if (!en.isGrounded) {
                    en.vy += 1.2 * ts; en.y += en.vy * ts;
                    if (en.y >= enGround) { en.y = enGround; en.isGrounded = true; en.vy = 0; }
                } else { en.y = enGround; }

                const dist = Math.sqrt((en.x-p.x)**2 + (en.y-p.y)**2);
                
                // Parry logic (Ronin is safe and strikes faster if parrying)
                if (dist < 140 && (p.move === 'spin' || p.move === 'parry' || Math.random() < 0.2)) {
                    triggerCombatImpact(en.x, en.y - 40, p.move === 'parry' ? 2.0 : 1.0);
                    state.enemies.splice(i, 1);
                    state.swordTrails.push({x: p.x, y: p.y, tx: en.x, ty: en.y, life: 1.0});
                }
                if (Math.abs(en.x - p.x) > width) state.enemies.splice(i, 1);
            });

            state.particles.forEach((pt, i) => { 
                pt.x += pt.vx * ts; 
                pt.y += pt.vy * ts; 
                pt.vy += 0.4 * ts;
                pt.life -= 0.03 * ts; 
                if(pt.life <= 0) state.particles.splice(i, 1); 
            });
            state.petals.forEach((pe, i) => { 
                pe.x += pe.vx * ts; 
                pe.y += pe.vy * ts; 
                pe.r += pe.rv * ts; 
                if(pe.y > height + 50) state.petals.splice(i, 1); 
            });
            state.swordTrails.forEach((tr, i) => { 
                tr.life -= 0.1 * ts; 
                if(tr.life <= 0) state.swordTrails.splice(i, 1); 
            });
        }

        function drawFocusEffect() {
            if (state.timeScale >= 1) return;

            // Chromatic Aberration & Vignette
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width * 0.8);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(204, 0, 0, 0.4)');
            
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // Subtle scanlines or grain in slowmo
            ctx.globalAlpha = 0.05;
            ctx.fillStyle = '#fff';
            for(let i=0; i<height; i+=4) {
                ctx.fillRect(0, i, width, 1);
            }
            ctx.globalAlpha = 1;
        }

        function draw() {
            update();
            
            const bgColor = state.timeScale < 1 ? '#050000' : BLACK;
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);

            // Shift colors slightly if in focus mode
            if (state.timeScale < 1) {
                ctx.save();
                ctx.translate(2, 0); // Red shift
            }

            state.sakuraTrees.forEach(t => {
                let tx = (t.worldX - (state.distance * 0.4)) % (width * 2);
                if (tx < -300) tx += width * 2;
                drawSakuraTree(tx, getGroundHeight(tx), t.scale);
            });

            ctx.beginPath();
            ctx.moveTo(0, height);
            for(let x=0; x<=width; x+=10) {
                ctx.lineTo(x, getGroundHeight(x));
            }
            ctx.lineTo(width, height);
            ctx.fillStyle = BLACK;
            ctx.fill();

            ctx.strokeStyle = RED;
            ctx.lineWidth = 3;
            ctx.beginPath();
            for(let x=0; x<=width; x+=5) {
                const y = getGroundHeight(x);
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            if (state.timeScale < 1) ctx.restore();

            state.swordTrails.forEach(tr => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${tr.life})`;
                ctx.lineWidth = 6 * tr.life;
                ctx.beginPath(); ctx.moveTo(tr.x, tr.y - 40); ctx.lineTo(tr.tx, tr.ty - 40); ctx.stroke();
            });

            state.enemies.forEach(en => {
                drawStickman(en.x, en.y, '#1a1a1a', en.isGrounded ? 0 : Math.sin(state.player.frame*0.2), state.player.frame + en.frameOffset, 'run', true, en.side);
            });
            
            const p = state.player;
            drawStickman(p.x, p.y, state.timeScale < 1 ? '#fff' : RED, p.rotation, p.frame, p.move);

            ctx.fillStyle = RED;
            state.petals.forEach(pe => {
                ctx.save(); ctx.translate(pe.x, pe.y); ctx.rotate(pe.r); 
                ctx.fillRect(-2, -1, 5, 3); 
                ctx.restore();
            });

            state.particles.forEach(pt => {
                ctx.fillStyle = pt.color;
                ctx.globalAlpha = pt.life;
                const streakX = pt.vx * 0.2;
                const streakY = pt.vy * 0.2;
                ctx.beginPath();
                ctx.moveTo(pt.x, pt.y);
                ctx.lineTo(pt.x - streakX, pt.y - streakY);
                ctx.lineWidth = pt.size;
                ctx.strokeStyle = pt.color;
                ctx.stroke();
            });
            ctx.globalAlpha = 1;

            drawFocusEffect();

            if (isRunning) requestAnimationFrame(draw);
        }

        function handleSlowmo() {
            if (!isRunning) return;
            state.slowdownTimer = 3000;
        }

        window.addEventListener('mousedown', handleSlowmo);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleSlowmo();
        });

        function initGame() {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 2000);
            isRunning = true;
            resize();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
